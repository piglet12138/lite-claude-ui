  <g transform="translate(340 98)">
    <g>
      <circle cx="14" cy="14" r="14" fill="#f4efe7"/>
      <path d="M14 4 C17 9 22 11 27 14 C22 17 17 19 14 24 C11 19 6 17 1 14 C6 11 11 9 14 4Z" fill="#c96342"/>
    </g>
    <rect x="42" y="0" width="540" height="86" rx="12" fill="#fffaf2"/>
    <text x="62" y="30" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#2d251d">可以。我先把这份资料整理成一份可复制到 Google Docs 的文档。</text>
    <text x="62" y="58" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#6f6256">我会保留背景、目标、核心功能、风险和下一步，并生成右侧预览。</text>
  </g>


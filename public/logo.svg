<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d4885c"/>
      <stop offset="100%" stop-color="#a85a32"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="96" height="96" rx="22" fill="url(#bg)"/>
  <rect width="96" height="96" rx="22" fill="url(#glow)"/>
  <g transform="translate(48,48)" fill="#fff">
    <!-- Main 6 rays (rounded capsules) -->
    <rect x="-3.2" y="-26" width="6.4" height="22" rx="3.2" transform="rotate(0)"/>
    <rect x="-3.2" y="-26" width="6.4" height="22" rx="3.2" transform="rotate(60)"/>
    <rect x="-3.2" y="-26" width="6.4" height="22" rx="3.2" transform="rotate(120)"/>
    <rect x="-3.2" y="-26" width="6.4" height="22" rx="3.2" transform="rotate(180)"/>
    <rect x="-3.2" y="-26" width="6.4" height="22" rx="3.2" transform="rotate(240)"/>
    <rect x="-3.2" y="-26" width="6.4" height="22" rx="3.2" transform="rotate(300)"/>
    <!-- Secondary 6 rays (smaller, offset 30deg) -->
    <rect x="-2.2" y="-19" width="4.4" height="13" rx="2.2" opacity="0.7" transform="rotate(30)"/>
    <rect x="-2.2" y="-19" width="4.4" height="13" rx="2.2" opacity="0.7" transform="rotate(90)"/>
    <rect x="-2.2" y="-19" width="4.4" height="13" rx="2.2" opacity="0.7" transform="rotate(150)"/>
    <rect x="-2.2" y="-19" width="4.4" height="13" rx="2.2" opacity="0.7" transform="rotate(210)"/>
    <rect x="-2.2" y="-19" width="4.4" height="13" rx="2.2" opacity="0.7" transform="rotate(270)"/>
    <rect x="-2.2" y="-19" width="4.4" height="13" rx="2.2" opacity="0.7" transform="rotate(330)"/>
    <!-- Center dot -->
    <circle r="5" opacity="0.95"/>
  </g>
</svg>
